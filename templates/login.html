<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تسجيل الدخول</title>

<style>

body{
    font-family: Arial;
    background:#f3f4f6;
    text-align:center;
    padding-top:100px;
}

.login-box{

    background:white;
    width:350px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px #aaa;

}

input{

    width:90%;
    padding:10px;
    margin:10px;

}

button{

    width:95%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;

}

</style>

</head>


<body>


<div class="login-box">


<h2>🛒 نظام البقالة</h2>

<h3>تسجيل الدخول</h3>


<form method="POST" action="/login">


<input 
name="username"
placeholder="اسم المستخدم"
required>


<input 
type="password"
name="password"
placeholder="كلمة المرور"
required>


<button>

دخول

</button>


</form>


</div>


</body>

</html>
