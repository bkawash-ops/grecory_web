<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تسجيل دفعة</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    width:400px;
    margin:auto;
}

input, textarea{

    width:90%;
    padding:10px;
    margin:8px;

}


button{

    background:#059669;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;

}


</style>

</head>


<body>


<div class="card">


<h2>
💵 تسجيل دفعة
</h2>
{% if error %}

<p style="
color:red;
font-weight:bold;
background:#fee2e2;
padding:10px;
border-radius:8px;
">

{{error}}

</p>

{% endif %}

<h3>
{{customer.name}}
</h3>


<form method="POST">


<label>
المبلغ
</label>

<br>

<input 
type="number"
step="0.01"
name="amount"
required>


<br>


<label>
ملاحظات
</label>

<br>


<textarea
name="notes"
placeholder="مثال: دفعة نقدية">
</textarea>


<br><br>


<button type="submit">

💾 حفظ الدفعة

</button>


</form>


<br>


<a href="{{ url_for('customer_account', id=customer.id) }}">
⬅ العودة لكشف الحساب
</a>


</div>


</body>

</html>
