<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>سجل الفواتير</title>

</head>


<body>


<h2>
🧾 سجل الفواتير
</h2>
<input 
type="text"
id="search"
placeholder="🔍 ابحث برقم الفاتورة..."
onkeyup="searchInvoice()"
style="
padding:10px;
width:300px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
">

<table border="1" width="100%">

<tr>

<th>
رقم الفاتورة
</th>

<th>
المستخدم
</th>

<th>
المبلغ
</th>

<th>
التاريخ
</th>
<th>
الإجراء
</th>
</tr>


{% for inv in invoices %}

<tr class="invoice-row">

<td>
{{inv[1]}}
</td>

<td>
{{inv[2]}}
</td>

<td>
{{"%.2f"|format(inv[3])}} JOD
</td>

<td>
{{ inv[4].strftime('%d-%m-%Y %H:%M') }}
</td>

<td>

<a href="/invoice/{{inv[1]}}">
👁️ عرض
</a>

</td>

</tr>

{% endfor %}


</table>


<br>

<a href="/">
⬅ العودة
</a>
<script>

function searchInvoice(){

    let filter =
    document.getElementById("search").value.toLowerCase();


    let rows =
    document.querySelectorAll(".invoice-row");


    rows.forEach(function(row){

        let invoiceNumber =
        row.cells[0].innerText.toLowerCase();


        if(invoiceNumber.includes(filter)){

            row.style.display="";

        }else{

            row.style.display="none";

        }

    });

}

</script>

</body>

</html>
