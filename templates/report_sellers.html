<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تقرير البائعين</title>


<style>

body{
    font-family:Arial;
    background:#f3f4f6;
    padding:30px;
}


.card{

    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 6px #ccc;

}


h2{

text-align:center;

}


table{

width:100%;
border-collapse:collapse;

margin-top:20px;

}


th{

background:#1f2937;
color:white;

}


td,th{

padding:12px;
border:1px solid #ccc;
text-align:center;

}


.back{

display:inline-block;
margin-top:20px;

background:#6b7280;
color:white;

padding:12px 25px;

border-radius:8px;

text-decoration:none;

}


</style>


</head>


<body>


<div class="card">


<h2>
👤 تقرير البائعين
</h2>



<table>


<tr>

<th>
البائع
</th>


<th>
عدد الفواتير
</th>


<th>
إجمالي المبيعات
</th>


</tr>



{% for s in sellers %}


<tr>


<td>
{{s["username"]}}
</td>


<td>
{{s["invoice_count"]}}
</td>


<td>
{{"%.2f"|format(s["total_sales"])}} JOD
</td>


</tr>


{% endfor %}


</table>



<a class="back" href="/">

⬅ العودة

</a>



</div>


</body>

</html>
