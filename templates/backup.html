<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>النسخ الاحتياطي</title>

<style>

body{
    font-family:Arial;
    background:#f3f4f6;
    padding:30px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 2px 6px #ccc;
    text-align:center;
}


button,a{

    padding:12px 25px;
    border-radius:8px;
    text-decoration:none;
    border:none;
    cursor:pointer;
    font-size:18px;
    display:inline-block;

}


.backup{

    background:#16a34a;
    color:white;

}


.back{

    background:#6b7280;
    color:white;

}

</style>

</head>


<body>


<h2>
💾 النسخ الاحتياطي
</h2>


<div class="card">


<p>
إنشاء نسخة احتياطية من قاعدة البيانات
</p>


<div style="display:flex; justify-content:center; gap:20px; margin-top:30px;">

<a class="backup" href="/backup">
📥 تحميل النسخة الاحتياطية
</a>


<a class="back" href="/">
⬅ العودة للوحة الإدارة
</a>

</div>


</body>

</html>
