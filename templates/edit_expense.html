<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تعديل مصروف</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
padding:40px;
text-align:center;
}


.card{

background:white;
padding:30px;
width:500px;
margin:auto;
border-radius:15px;
box-shadow:0 3px 10px #ccc;

}


input,textarea{

width:90%;
padding:12px;
margin:10px;
font-size:18px;

}


button{

background:#2563eb;
color:white;
padding:12px 30px;
border:none;
border-radius:8px;
font-size:18px;

}

</style>

</head>


<body>


<div class="card">

<h2>
✏️ تعديل المصروف
</h2>


<form method="POST">


<input 
name="description"
value="{{expense.description}}"
placeholder="بيان المصروف">


<input 
name="amount"
value="{{expense.amount}}"
placeholder="المبلغ">


<textarea
name="notes"
placeholder="ملاحظات">{{expense.notes}}</textarea>


<button>

💾 حفظ التعديل

</button>


</form>


</div>


</body>

</html>
