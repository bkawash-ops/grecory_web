<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<style>

@media print {

    .no-print {
        display:none;
    }

}

</style>
<meta charset="UTF-8">

<title>فاتورة بيع</title>

<style>

body{
    font-family: Arial;
    padding:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #000;
    padding:10px;
    text-align:center;
}

th{
    background:#eee;
}

.total{
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}

button{
    padding:12px 20px;
    font-size:18px;
}

@media print{
    button{
        display:none;
    }
}

</style>

</head>


<body>


<h2>🛒 فاتورة بقالة</h2>

<p>
التاريخ:
{{ time.strftime("%Y-%m-%d %H:%M") }}
</p>
<p>
رقم الفاتورة: {{invoice_number}}
</p>

<table>

<tr>
<th>المنتج</th>
<th>السعر</th>
<th>الكمية</th>
<th>المجموع</th>
</tr>


{% for item in items %}

<tr>

<td>{{item.name}}</td>

<td>{{item.price}} JOD</td>

<td>{{item.qty}}</td>

<td>{{item.total}} JOD</td>

</tr>

{% endfor %}


</table>


<div class="total">

الإجمالي:
{{total}} JOD

</div>


<br>

<button onclick="window.print()">
🖨️ طباعة
</button>
<br><br>

<div class="no-print">

<a href="{{ url_for('seller') if session.get('user') == 'seller' else url_for('index') }}" 
style="
background:#2563eb;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:8px;
display:inline-block;
">

⬅ العودة للبيع

</a>

</div>
</body>

</html>
