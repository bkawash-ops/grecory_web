<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تقرير المصروفات</title>

<style>

body{
    font-family:Arial;
    background:#f3f4f6;
    padding:40px;
    text-align:center;
}


.card{

    background:white;
    width:750px;
    margin:auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 3px 10px #ccc;

}


h1{

    color:#1f2937;

}


table{

    width:100%;
    border-collapse:collapse;
    margin-top:25px;

}


th{

    background:#2563eb;
    color:white;

}


td,th{

    padding:12px;
    border:1px solid #ccc;

}


.total{

    margin-top:20px;
    font-size:22px;
    font-weight:bold;

}


.print-btn{

    background:#059669;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;

}


.back{

    display:inline-block;
    background:#6b7280;
    color:white;
    padding:12px 25px;
    border-radius:8px;
    text-decoration:none;
    margin-right:10px;

}


@media print{

    .print-btn,
    .back{

        display:none;

    }

    body{

        background:white;

    }

    .card{

        box-shadow:none;

    }

}


</style>

</head>


<body>


<div class="card">


<h1>
📊 تقرير المصروفات
</h1>


<table>

<tr>

<th>
التاريخ
</th>

<th>
البيان
</th>

<th>
المبلغ
</th>

<th>
المستخدم
</th>

</tr>


{% for e in expenses %}

<tr>

<td>
{{ (e.expense_date + timedelta(hours=3)).strftime('%d-%m-%Y %H:%M') }}
</td>


<td>
{{e.title}}
</td>


<td>
{{"%.2f"|format(e.amount)}} JOD
</td>


<td>
{{e.username}}
</td>


</tr>

{% endfor %}


</table>


<div class="total">

إجمالي المصروفات:
{{"%.2f"|format(total_expenses)}} JOD

</div>


<br>


<button class="print-btn" onclick="window.print()">

🖨️ طباعة التقرير

</button>


<a class="back" href="/reports_menu">

⬅ العودة للتقارير

</a>


</div>


</body>

</html>
