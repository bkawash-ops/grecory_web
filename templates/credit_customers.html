<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>الأرصدة الدائنة</title>
</head>

<body>

<h2>
💚 العملاء أصحاب الأرصدة الدائنة
</h2>


<table border="1" width="80%" align="center">

<tr>
<th>رقم العميل</th>
<th>الاسم</th>
<th>الهاتف</th>
<th>الرصيد الدائن</th>
</tr>


{% for c in customers %}

<tr>

<td>
{{ c.customer_code }}
</td>

<td>
{{ c.name }}
</td>

<td>
{{ c.phone }}
</td>

<td style="color:green;font-weight:bold;">
{{ "%.2f"|format(c.credit_balance) }} JOD
</td>

</tr>

{% endfor %}


</table>

</body>

</html>
