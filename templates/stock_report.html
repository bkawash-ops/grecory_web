<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تقرير حركة المخزون</title>
<style>

body{
    font-family:Arial;
    background:#f3f4f6;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#1f2937;
    color:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

@media print{

    body{
        background:white;
    }

    .no-print{
        display:none !important;
    }

}

</style>
</head>


<body>

<h2>
📦 تقرير حركة المخزون
</h2>
<div class="no-print" style="margin-bottom:20px; text-align:center;">

<button
onclick="window.print()"
style="
background:#7c3aed;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
">

🖨️ طباعة التقرير

</button>

<a
href="/reports_menu"
style="
background:#6b7280;
color:white;
padding:12px 25px;
border-radius:8px;
font-size:18px;
text-decoration:none;
margin-right:10px;
display:inline-block;
">

⬅ العودة

</a>

</div>

<table border="1" width="100%">

<tr>

<th>
المنتج
</th>

<th>
المخزون الحالي
</th>

<th>
الكمية المباعة
</th>

<th>
قيمة المبيعات
</th>
<th>
قيمة المخزون
</th>
</tr>


{% for p in products %}

<tr>

<td>
{{p.name}}
</td>


<td>
{{p.current_qty}}
</td>


<td>
{{p.sold_qty}}
</td>


<td>
{{"%.2f"|format(p.sales_value)}}
JOD
</td>
<td>
{{"%.2f"|format(p.stock_value)}} JOD
</td>

</tr>

{% endfor %}


</table>


</body>

</html>
