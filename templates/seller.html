<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>شاشة البيع</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}


.card{

    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;

}


button{

    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;

}


.cart{

    background:#2563eb;
    color:white;

}


.logout{

    float:left;
}

</style>

</head>


<body>


<a class="logout" href="/logout">
🚪 خروج
</a>


<h2>🛒 شاشة البيع</h2>


<div class="card">


<h3>اختيار المنتج</h3>


<form method="POST" action="/add_to_cart">


<select name="product_id" required>


<select id="product_id" name="product_id" required onchange="showProductInfo()">

<option value="">
اختر المنتج
</option>

{% for p in products %}

<option 
value="{{p.id}}"
data-price="{{p.price}}"
data-qty="{{p.qty}}">

{{p.name}}

</option>

{% endfor %}

</select>


<div id="info" style="margin-top:15px;font-weight:bold;">

</div>


<br><br>


<label>
الكمية
</label>


<input 
id="qty"
name="qty"
type="number"
step="0.1"
value="1"
required
oninput="checkQty()">


<br><br>


<button class="cart">

🛒 إضافة للسلة

</button>


</form>


</div>



<div class="card">


<h3>
🧾 الفاتورة الحالية
</h3>


<a href="/cart">

عرض السلة وإصدار الفاتورة

</a>


</div>
<script>

let availableQty = 0;


function showProductInfo(){

    let select = document.getElementById("product_id");

    let option = select.options[select.selectedIndex];


    if(option.value){

        let price = option.dataset.price;

        availableQty = parseFloat(option.dataset.qty);


        document.getElementById("info").innerHTML =
        "💰 السعر: " + price + " JOD<br>" +
        "📦 المتوفر: " + availableQty;


    }else{

        document.getElementById("info").innerHTML="";

    }

}



function checkQty(){

    let qty = parseFloat(
        document.getElementById("qty").value
    );


    if(qty > availableQty){

        alert(
        "⚠️ الكمية المطلوبة أكبر من المخزون المتوفر"
        );


        document.getElementById("qty").value = availableQty;

    }

}

</script>

</body>

</html>
