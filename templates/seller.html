<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>شاشة البيع</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}


.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}


button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}


.cart{
    background:#2563eb;
    color:white;
}


.logout{
    float:left;
    text-decoration:none;
    background:#dc2626;
    color:white;
    padding:8px 12px;
    border-radius:6px;
}


select,input{
    padding:10px;
    width:250px;
    margin:5px;
}


.info{

    margin-top:15px;
    padding:10px;
    background:#eee;
    border-radius:6px;

}


</style>

</head>


<body>


<a class="logout" href="/logout">
🚪 خروج
</a>


<h2>🛒 شاشة البيع</h2>



<div class="card">


<h3>اختيار المنتج</h3>



<form method="POST" action="/add_to_cart">



<select 
id="product_id"
name="product_id"
required
onchange="showProductInfo()">


<option value="">
اختر المنتج
</option>



{% for p in products %}


<option

value="{{p.id}}"

data-price="{{p.price}}"

data-qty="{{p.qty}}">


{{p.name}}


</option>


{% endfor %}



</select>



<div id="info" class="info">

اختر منتجاً

</div>




<br>


<label>
الكمية
</label>


<br>


<input

id="qty"

name="qty"

type="number"

step="0.1"

value="1"

required

oninput="checkQty()"



>



<br><br>


<button class="cart">

🛒 إضافة للسلة

</button>



</form>



</div>




<div class="card">


<h3>
🧾 الفاتورة الحالية
</h3>



<a href="/cart">

عرض السلة وإصدار الفاتورة

</a>



</div>






<script>


let availableQty = 0;



function showProductInfo(){


    let select = document.getElementById("product_id");


    let option = select.options[select.selectedIndex];



    if(option.value){


        let price = option.dataset.price;


        availableQty = parseFloat(option.dataset.qty);



        document.getElementById("info").innerHTML =

        "💰 السعر: " + price + " JOD<br>" +

        "📦 الكمية المتوفرة: " + availableQty;



    }

    else{


        availableQty = 0;


        document.getElementById("info").innerHTML =
        "اختر منتجاً";


    }


}




function checkQty(){


    let qty = parseFloat(
        document.getElementById("qty").value
    );



    if(availableQty > 0 && qty > availableQty){


        alert(
        "⚠️ الكمية المطلوبة أكبر من المخزون!"
        );



        document.getElementById("qty").value = availableQty;



    }


}



</script>



</body>

</html>
