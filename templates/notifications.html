<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>الإشعارات</title>


<style>

body{

    font-family:Arial;

    background:#f3f4f6;

    padding:30px;

}


.card{

    background:white;

    padding:25px;

    margin-bottom:20px;

    border-radius:12px;

    box-shadow:0 2px 6px #ccc;

}


h2{

    text-align:center;

}


.notification{

    padding:15px;

    margin:10px 0;

    border-radius:8px;

    font-size:18px;

    font-weight:bold;

}


.warning{

    background:#fff3cd;

    border:1px solid #f59e0b;

}


.info{

    background:#dbeafe;

    border:1px solid #2563eb;

}


.success{

    background:#dcfce7;

    border:1px solid #16a34a;

}


.back{

    display:block;

    width:200px;

    margin:20px auto;

    background:#6b7280;

    color:white;

    padding:12px;

    text-align:center;

    border-radius:8px;

    text-decoration:none;

}


</style>

</head>


<body>


<h2>
🔔 مركز الإشعارات
</h2>


<div class="card">


<div class="notification warning">

⚠️ يوجد منتجات تحتاج إعادة طلب

</div>



<div class="notification info">

💰 ملخص مبيعات اليوم

</div>



<div class="notification success">

🏆 أكثر صنف مبيعاً

</div>


</div>



<a class="back" href="/">

⬅ العودة للوحة الإدارة

</a>


</body>

</html>
