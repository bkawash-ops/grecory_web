<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>إدارة المنتجات</title>
</head>

<body>

<h2>📦 إدارة المنتجات</h2>

<table border="1" width="100%">

<tr>
<th>المنتج</th>
<th>السعر</th>
<th>الكمية</th>
<th>الإجراء</th>
</tr>

{% for p in products %}

<tr>
<td>{{p.name}}</td>
<td>{{p.price}}</td>
<td>{{p.qty}}</td>

<td>

<a href="/edit_product/{{p.id}}">
✏️ تعديل
</a>

&nbsp;

<a href="/delete_product/{{p.id}}"
   onclick="return confirm('هل أنت متأكد من حذف هذا المنتج نهائياً؟')">
🗑️ حذف
</a>

</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">
⬅ العودة للأدمن
</a>

</body>

</html>
