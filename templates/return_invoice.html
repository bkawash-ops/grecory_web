<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>مرتجع فاتورة</title>
</head>

<body>

<h2>
🔄 مرتجع فاتورة رقم {{sale["invoice_number"]}}
</h2>


<h3>
اختر الأصناف المراد إرجاعها
</h3>


<table border="1" width="100%">

<tr>
<th>الصنف</th>
<th>الكمية المباعة</th>
<th>كمية الإرجاع</th>
</tr>


{% for item in items %}

<tr>

<td>
{{item["product_name"]}}
</td>

<td>
{{item["quantity"]}}
</td>

<td>

<input 
type="number"
min="0"
max="{{item['quantity']}}"
value="0">

</td>

</tr>

{% endfor %}


</table>


<br>

<button>
💾 حفظ المرتجع
</button>


</body>

</html>
