<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>المصروفات</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
padding:40px;
text-align:center;
}


.card{

background:white;
width:800px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 3px 10px #ccc;

}


input,textarea,button{

padding:12px;
font-size:17px;
margin:5px;

}


table{

width:100%;
border-collapse:collapse;
margin-top:25px;

}


th{

background:#dc2626;
color:white;

}


td,th{

padding:10px;
border:1px solid #ccc;

}


.total{

font-size:22px;
font-weight:bold;
margin-top:20px;

}
.form-row{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;

}


.form-row input{

    height:45px;
    box-sizing:border-box;

}


.form-row button{

    height:45px;

}

</style>

</head>


<body>


<div class="card">


<h1>
💸 المصروفات
</h1>


<form method="POST">


<div class="form-row">

<input name="title" placeholder="بيان المصروف" required>


<input name="amount" 
type="number" 
step="0.01" 
placeholder="المبلغ"
required>


<input name="notes" 
placeholder="ملاحظات">


<button>
➕ إضافة
</button>

</div>


</form>



<table>


<tr>

<th>
التاريخ
</th>

<th>
البيان
</th>

<th>
المبلغ
</th>

<th>
المستخدم
</th>
<th>
إجراء
</th>
</tr>


{% for e in expenses %}


<tr>

<td>
{{ (e.expense_date + timedelta(hours=3)).strftime('%d-%m-%Y %H:%M') }}
</td>


<td>
{{e.title}}
</td>


<td>
{{"%.2f"|format(e.amount)}} JOD
</td>


<td>
{{e.username}}
</td>
<td>

<a href="/delete_expense/{{e.id}}"
onclick="return confirm('هل تريد حذف هذا المصروف؟')"
style="
background:#dc2626;
color:white;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
">

🗑️ حذف

</a>

</td>

</tr>


{% endfor %}


</table>



<div class="total">

إجمالي المصروفات:
{{"%.2f"|format(total_expenses)}} JOD

</div>



<br>


<a href="/reports">

⬅ العودة للتقارير

</a>


</div>


</body>

</html>
