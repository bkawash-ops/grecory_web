<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>POS بقالة</title>

<link rel="stylesheet" href="/static/style.css">


<style>

body{
    font-family: Arial;
    background:#f3f4f6;
    padding:20px;
}


.card{

    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 2px 5px #ccc;

}


table{

    width:100%;
    background:white;
    border-collapse:collapse;

}


th{

    background:#1f2937;
    color:white;

}


td,th{

    padding:10px;
    text-align:center;

}


input,select{

    padding:10px;
    margin:5px;
    border-radius:6px;
    border:1px solid #ccc;

}


button{

    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;

}


.add{

    background:#16a34a;
    color:white;

}


.cart{

    background:#2563eb;
    color:white;

}


.invoice{

    display:block;
    margin-top:15px;
    background:#dc2626;
    color:white;
    padding:12px;
    text-align:center;
    border-radius:6px;
    text-decoration:none;

}


</style>


</head>


<body>


<h2>
🛒 نظام البقالة POS
</h2>

<a href="/logout" class="logout">
    🚪 خروج
</a>

<style>
.logout {
    position: absolute;
    left: 20px;
    top: 20px;

    background-color: #dc3545;
    color: white;
    padding: 12px 25px;
    font-size: 20px;
    font-weight: bold;

    text-decoration: none;
    border-radius: 10px;
    border: none;

    display: inline-block;
    cursor: pointer;

    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.logout:hover {
    background-color: #b02a37;
    transform: scale(1.05);
}
</style>

<div class="card">


<h3>
➕ إضافة منتج
</h3>


<form method="POST" action="/add_product">


<input 
name="name"
placeholder="اسم المنتج"
required>


<input 
name="price"
type="number"
step="0.01"
placeholder="السعر"
required>


<input 
name="qty"
type="number"
step="0.1"
placeholder="الكمية"
required>


<button class="add">

إضافة

</button>


</form>


</div>




<div class="card">


<h3>
📦 المخزون
</h3>


<table border="1">


<tr>

<th>المنتج</th>

<th>السعر</th>

<th>الكمية</th>

</tr>



{% for p in products %}


<tr>


<td>
{{p.name}}
</td>


<td>

{{ "%.2f"|format(p.price) }}

 JOD

</td>


<td>


{{p.qty}}


</td>



</tr>



{% endfor %}


</table>


</div>






<div class="card">


<h3>
🧾 الكاشير
</h3>



<form method="POST" action="/add_to_cart">



<label>
اختر الصنف:
</label>



<select name="product_id" required>


<option value="">
-- اختر المنتج --
</option>



{% for p in products %}



<option value="{{p.id}}">


{{p.name}}

-

{{ "%.2f"|format(p.price) }}

JOD

-

المتوفر:

{{p.qty}}



</option>



{% endfor %}



</select>




<br>



<label>
الكمية:
</label>


<input

name="qty"

type="number"

step="0.1"

min="1"

value="1"

required>



<br><br>




<button class="cart">

🛒 إضافة للسلة

</button>




</form>





<a href="/cart" class="invoice">

🧾 فتح الفاتورة الحالية

</a>



</div>



</body>

</html>
