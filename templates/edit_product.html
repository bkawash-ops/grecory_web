<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>تعديل المنتج</title>

</head>


<body>

<h2>✏️ تعديل المنتج</h2>


<form method="POST">


<label>
اسم المنتج
</label>

<br>

<input 
name="name"
value="{{product.name}}"
required>


<br><br>


<label>
السعر
</label>

<br>

<input 
name="price"
type="number"
step="0.01"
value="{{product.price}}"
required>


<br><br>


<label>
الكمية
</label>

<br>

<input 
name="qty"
type="number"
step="0.1"
value="{{product.qty}}"
required>


<br><br>


<button type="submit">

💾 حفظ التعديل

</button>


</form>


<br>


<a href="/products">

⬅ العودة للمنتجات

</a>


</body>

</html>
